[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentmint"
version = "0.1.0"
description = "Cryptographic proof that a human approved an AI agent action"
readme = "README.md"
license = "MIT"
authors = [
    { name = "Aniketh Maddipati" }
]
keywords = ["ai", "agents", "authorization", "security", "crewai", "langchain"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
requires-python = ">=3.10"
dependencies = [
    "pynacl>=1.5.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
]
crewai = [
    "crewai>=0.1.0",
]

[project.urls]
Homepage = "https://agent-mint.dev"
Repository = "https://github.com/aniketh-maddipati/agentmint-python"

[tool.pytest.ini_options]
testpaths = ["tests"]
